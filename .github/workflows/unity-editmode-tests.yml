name: Unity EditMode Tests

on:
  workflow_dispatch:
  # The workflow definition for a self-hosted job must come from the trusted
  # base branch. Fork pull requests are deliberately skipped by the job guard.
  pull_request_target:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - develop
      - main

concurrency:
  group: unity-editmode-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  editmode:
    name: Unity 2021.3 EditMode
    if: >-
      github.event_name != 'pull_request_target' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association))
    runs-on:
      - self-hosted
      - Linux
      - X64
      - package-installer-ci
    timeout-minutes: 45
    env:
      UNITY_EDITOR: /opt/unity/2021.3.45f1/Editor/Unity
      TEMP_NAME: package-installer-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Prepare disposable paths
        shell: bash
        run: |
          set -euo pipefail
          temp_root="$RUNNER_TEMP/$TEMP_NAME"
          {
            echo "TEMP_ROOT=$temp_root"
            echo "PROJECT_PATH=$temp_root/UnityTestProject"
            echo "ARTIFACTS_PATH=$temp_root/artifacts"
          } >> "$GITHUB_ENV"

      - name: Check out package
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          clean: true
          fetch-depth: 2
          persist-credentials: false
          ref: ${{ github.event_name == 'pull_request_target' && format('refs/pull/{0}/merge', github.event.number) || github.sha }}

      - name: Verify checked-out revision
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EXPECTED_SHA: ${{ github.sha }}
          EXPECTED_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request_target" ]]; then
            test "$(git rev-parse HEAD^1)" = "$EXPECTED_BASE_SHA"
            test "$(git rev-parse HEAD^2)" = "$EXPECTED_HEAD_SHA"
          else
            test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
          fi

      - name: Verify isolated Unity fixture
        shell: bash
        run: |
          set -euo pipefail
          test "$(id -un)" = "deucarian-runner"
          test -x "$UNITY_EDITOR"

      - name: Create disposable Unity project
        shell: bash
        run: |
          set -euo pipefail
          expected_root="$RUNNER_TEMP/package-installer-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          test "$TEMP_ROOT" = "$expected_root"
          rm -rf -- "$TEMP_ROOT"
          mkdir -p \
            "$PROJECT_PATH/Assets" \
            "$PROJECT_PATH/Packages/com.deucarian.package-installer" \
            "$PROJECT_PATH/ProjectSettings" \
            "$ARTIFACTS_PATH"
          git archive --format=tar HEAD | tar -xf - -C "$PROJECT_PATH/Packages/com.deucarian.package-installer"
          cat > "$PROJECT_PATH/Packages/manifest.json" <<'JSON'
          {
            "dependencies": {
              "com.deucarian.editor": "https://github.com/Deucarian/Editor.git#8f85a9c808b813781e1f6c7f6aa6414f6b596493",
              "com.deucarian.logging": "https://github.com/Deucarian/Logging.git#683d88858942d2d3c551135cbf1384b4f71cdd75",
              "com.unity.test-framework": "1.1.33"
            },
            "testables": [
              "com.deucarian.package-installer"
            ]
          }
          JSON
          cat > "$PROJECT_PATH/ProjectSettings/ProjectVersion.txt" <<'TEXT'
          m_EditorVersion: 2021.3.45f1
          TEXT

      - name: Run Package Installer EditMode tests
        id: unity-tests
        shell: bash
        run: |
          set -euo pipefail

          set +e
          "$UNITY_EDITOR" \
            -batchmode \
            -nographics \
            -accept-apiupdate \
            -forgetProjectPath \
            -disableManagedDebugger \
            -projectPath "$PROJECT_PATH" \
            -runTests \
            -testPlatform EditMode \
            -assemblyNames Deucarian.PackageInstaller.Editor.Tests \
            -testResults "$ARTIFACTS_PATH/editmode-results.xml" \
            -logFile "$ARTIFACTS_PATH/unity-editmode.log"
          unity_status=$?
          set -e

          echo "status=$unity_status" >> "$GITHUB_OUTPUT"

      - name: Validate Unity test results
        if: always()
        shell: bash
        env:
          UNITY_STATUS: ${{ steps.unity-tests.outputs.status }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          from pathlib import Path
          import xml.etree.ElementTree as ET

          result_path = Path(os.environ["ARTIFACTS_PATH"]) / "editmode-results.xml"
          if not result_path.is_file():
              raise SystemExit("Unity did not produce EditMode test results.")

          test_run = ET.parse(result_path).getroot()
          if test_run.tag != "test-run":
              raise SystemExit(f"Unexpected Unity test result root: {test_run.tag!r}.")

          total = int(test_run.attrib.get("total", "0"))
          passed = int(test_run.attrib.get("passed", "0"))
          failed = int(test_run.attrib.get("failed", "0"))
          inconclusive = int(test_run.attrib.get("inconclusive", "0"))
          skipped = int(test_run.attrib.get("skipped", "0"))
          result = test_run.attrib.get("result", "")

          if total <= 0:
              raise SystemExit("Unity reported zero EditMode tests.")
          if (
              failed != 0
              or inconclusive != 0
              or skipped != 0
              or result != "Passed"
              or passed != total
          ):
              raise SystemExit(
                  f"Unity EditMode results were not clean: "
                  f"result={result}, total={total}, passed={passed}, failed={failed}, "
                  f"inconclusive={inconclusive}, skipped={skipped}."
              )

          unity_status = os.environ.get("UNITY_STATUS", "")
          if unity_status != "0":
              raise SystemExit(f"Unity exited abnormally with status {unity_status or 'missing'}.")

          print(f"Unity EditMode tests passed: {passed}/{total}.")
          PY

      - name: Print Unity diagnostics on failure
        if: failure()
        shell: bash
        run: |
          if [[ -f "$ARTIFACTS_PATH/unity-editmode.log" ]]; then
            tail -n 300 "$ARTIFACTS_PATH/unity-editmode.log"
          fi

      - name: Upload Unity test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: unity-editmode-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/package-installer-${{ github.run_id }}-${{ github.run_attempt }}/artifacts
          if-no-files-found: warn
          retention-days: 14

      - name: Remove disposable Unity project
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          expected_root="$RUNNER_TEMP/package-installer-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          test "$TEMP_ROOT" = "$expected_root"
          rm -rf -- "$TEMP_ROOT"
