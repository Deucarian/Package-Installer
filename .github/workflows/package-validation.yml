name: Package Validation

on:
  pull_request:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Shared package validation
    uses: Deucarian/Package-Registry/.github/workflows/deucarian-package-validation.yml@develop
    with:
      package-config: deucarian-package.json

  validate-catalog-projection:
    name: Validate installer catalog projection
    # Coordinated with Package-Registry PR #8. Replace both immutable refs with
    # that PR's durable merged commit before this consumer change lands.
    uses: Deucarian/Package-Registry/.github/workflows/deucarian-catalog-projection-check.yml@9215f1d0c4443ba66768189d0afeb0b6e19ce2e7
    with:
      catalog: installer
      registry-ref: 9215f1d0c4443ba66768189d0afeb0b6e19ce2e7
