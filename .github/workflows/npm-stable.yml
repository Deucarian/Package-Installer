name: Publish stable package to npmjs

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npmjs. Leave false for validation-only dry runs."
        required: true
        type: boolean
        default: false
      create_git_tag:
        description: "Create and push vX.Y.Z after a successful publish."
        required: true
        type: boolean
        default: false
      auto_update_deucarian_dependencies:
        description: "Update com.deucarian dependency versions to latest npm stable versions before publishing."
        required: true
        type: boolean
        default: false
      run_unity_tests:
        description: "Run Unity tests using game-ci. Requires unity_project_path and Unity secrets."
        required: true
        type: boolean
        default: false
      unity_project_path:
        description: "Unity project path for optional tests. Package-only repos should leave this empty."
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  validate-and-publish:
    name: Validate and publish stable package
    runs-on: ubuntu-latest
    env:
      NPM_REGISTRY_URL: https://registry.npmjs.org
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Validate package manifest
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const stableSemver = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/;
          const requiredDeps = {
            'com.deucarian.logging': ['com.deucarian.editor'],
            'com.deucarian.package-installer': ['com.deucarian.editor', 'com.deucarian.logging'],
          };

          function fail(message) {
            console.error(`::error::${message}`);
            process.exitCode = 1;
          }

          if (!pkg.name || !pkg.name.startsWith('com.deucarian.')) {
            fail('package.json name must use the com.deucarian.* Unity package namespace.');
          }

          if (!stableSemver.test(pkg.version || '')) {
            fail(`Stable workflow requires stable SemVer X.Y.Z, got "${pkg.version || ''}".`);
          }

          if (!pkg.unity) {
            fail('package.json must declare a minimum Unity version.');
          }

          const dependencies = pkg.dependencies || {};
          for (const dependencyName of requiredDeps[pkg.name] || []) {
            if (!dependencies[dependencyName]) {
              fail(`${pkg.name} must declare dependency ${dependencyName} before publishing.`);
            }
          }

          if (process.exitCode) {
            process.exit(process.exitCode);
          }

          fs.appendFileSync(process.env.GITHUB_ENV, `PACKAGE_NAME=${pkg.name}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `PACKAGE_VERSION=${pkg.version}\n`);
          console.log(`Validated ${pkg.name}@${pkg.version}`);
          NODE

      - name: Resolve Deucarian dependency versions on npmjs
        shell: bash
        env:
          AUTO_UPDATE_DEUCARIAN_DEPENDENCIES: ${{ inputs.auto_update_deucarian_dependencies }}
        run: |
          node <<'NODE'
          const { execFileSync } = require('child_process');
          const fs = require('fs');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const dependencies = pkg.dependencies || {};
          const stableSemver = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/;
          const autoUpdate = process.env.AUTO_UPDATE_DEUCARIAN_DEPENDENCIES === 'true';
          const missing = [];
          const updates = [];
          const dependencyEntries = Object.entries(dependencies)
            .filter(([name]) => name.startsWith('com.deucarian.'))
            .sort(([left], [right]) => left.localeCompare(right));

          function npmView(args) {
            return execFileSync('npm', [...args, '--registry=https://registry.npmjs.org'], {
              encoding: 'utf8',
              stdio: ['ignore', 'pipe', 'pipe'],
            }).trim();
          }

          if (dependencyEntries.length === 0) {
            console.log('No com.deucarian dependencies declared. This package is first in the stable publish order.');
            fs.appendFileSync(process.env.GITHUB_ENV, 'DEUCARIAN_DEPENDENCIES_UPDATED=false\n');
            process.exit(0);
          }

          console.log('Stable publish order is enforced by requiring declared com.deucarian dependencies to exist on npmjs before publish.');

          for (const [name, version] of dependencyEntries) {
            const requiredVersion = String(version).trim();
            let latest = '';
            try {
              latest = npmView(['view', name, 'dist-tags.latest']);
            } catch (error) {
              missing.push(`${name}@${version} (no latest version is published on npmjs)`);
              continue;
            }

            console.log(`${name}: required=${version}, latest=${latest}`);

            if (!stableSemver.test(latest)) {
              missing.push(`${name}@${version} (latest npm version "${latest}" is not stable SemVer)`);
              continue;
            }

            let requiredExists = false;
            if (stableSemver.test(requiredVersion)) {
              try {
                npmView(['view', `${name}@${requiredVersion}`, 'version']);
                requiredExists = true;
              } catch (error) {
                requiredExists = false;
              }
            }

            if (requiredExists) {
              console.log(`Found required dependency ${name}@${requiredVersion} on npmjs.`);
            } else if (!stableSemver.test(requiredVersion)) {
              if (autoUpdate) {
                console.log(`Will update ${name} from non-stable or unresolved version "${version}" to latest stable ${latest}.`);
              } else {
                missing.push(`${name}@${version} (required version is not stable SemVer; latest available: ${latest})`);
                continue;
              }
            } else if (autoUpdate && requiredVersion !== latest) {
              console.log(`Will update ${name} from ${requiredVersion} to latest stable ${latest}.`);
            } else {
              missing.push(`${name}@${requiredVersion} (latest available: ${latest})`);
              continue;
            }

            if (autoUpdate && requiredVersion !== latest) {
              dependencies[name] = latest;
              updates.push(`${name}: ${version} -> ${latest}`);
            }
          }

          if (missing.length === 0) {
            if (updates.length > 0) {
              pkg.dependencies = dependencies;
              fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
              console.log('Updated com.deucarian dependency versions:');
              for (const update of updates) {
                console.log(`- ${update}`);
              }
              fs.appendFileSync(process.env.GITHUB_ENV, 'DEUCARIAN_DEPENDENCIES_UPDATED=true\n');
            } else {
              console.log('No com.deucarian dependency updates are needed.');
              fs.appendFileSync(process.env.GITHUB_ENV, 'DEUCARIAN_DEPENDENCIES_UPDATED=false\n');
            }

            process.exit(0);
          }

          const message = `Missing Deucarian dependency versions on npmjs: ${missing.join(', ')}`;
          console.error(`::error::${message}`);
          process.exit(1);
          NODE

      - name: Update package-lock for auto-updated dependencies
        if: ${{ inputs.auto_update_deucarian_dependencies && env.DEUCARIAN_DEPENDENCIES_UPDATED == 'true' && hashFiles('package-lock.json') != '' }}
        shell: bash
        run: npm install --package-lock-only --ignore-scripts --registry="${NPM_REGISTRY_URL}"

      - name: Show Deucarian dependency update diff
        if: ${{ inputs.auto_update_deucarian_dependencies }}
        shell: bash
        run: |
          if git diff --quiet -- package.json package-lock.json; then
            echo "No com.deucarian dependency update diff."
            exit 0
          fi

          git diff -- package.json package-lock.json

      - name: Optional Unity test guard
        if: ${{ inputs.run_unity_tests && inputs.unity_project_path == '' }}
        shell: bash
        run: |
          echo "::error::unity_project_path is required when run_unity_tests is enabled."
          exit 1

      - name: Run Unity tests
        if: ${{ inputs.run_unity_tests && inputs.unity_project_path != '' }}
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ inputs.unity_project_path }}
          testMode: all

      - name: npm pack dry run
        shell: bash
        run: npm pack --dry-run --ignore-scripts

      - name: Check whether package version already exists
        id: registry
        shell: bash
        run: |
          set +e
          existing="$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry="${NPM_REGISTRY_URL}" 2>/dev/null)"
          status=$?
          set -e

          if [ "$status" -eq 0 ] && [ -n "$existing" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::warning::${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npmjs."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is not published on npmjs."
          fi

      - name: Refuse duplicate stable publish
        if: ${{ inputs.publish && steps.registry.outputs.exists == 'true' }}
        shell: bash
        run: |
          echo "::error::Refusing to publish ${PACKAGE_NAME}@${PACKAGE_VERSION}; that version already exists on npmjs."
          exit 1

      - name: Commit auto-updated Deucarian dependencies
        if: ${{ inputs.publish && inputs.auto_update_deucarian_dependencies && env.DEUCARIAN_DEPENDENCIES_UPDATED == 'true' }}
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error::Refusing to commit dependency updates from branch ${GITHUB_REF_NAME}; stable publishes must run from main."
            exit 1
          fi

          changed_files="$(git diff --name-only; git ls-files --others --exclude-standard)"
          unsafe_files="$(printf '%s\n' "$changed_files" | sed '/^$/d' | grep -Ev '^(package\.json|package-lock\.json)$' || true)"

          if [ -n "$unsafe_files" ]; then
            echo "::error::Refusing to commit unsafe dependency update; unexpected files changed:"
            printf '%s\n' "$unsafe_files"
            exit 1
          fi

          if git diff --quiet -- package.json package-lock.json; then
            echo "No dependency update commit needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          if [ -f package-lock.json ]; then
            git add package-lock.json
          fi
          git commit -m "Update Deucarian dependency versions for npm publish"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Publish package
        if: ${{ inputs.publish }}
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is required to publish."
            exit 1
          fi

          npm publish --tag latest --registry="${NPM_REGISTRY_URL}"

      - name: Create Git tag
        if: ${{ inputs.publish && inputs.create_git_tag }}
        shell: bash
        run: |
          tag="v${PACKAGE_VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "::error::Git tag ${tag} already exists."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git push origin "$tag"
